<style>
 body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;

  -webkit-font-smoothing: antialiased; /* 文字をより滑らかに表示 */

  line-height: 1.6;      /* 行間を広げると可読性が上がります */
}
 /* ログインボタンや入力欄のフォントも合わせる */
input, button {
  font-family: inherit; /* bodyで設定したフォントを引き継ぐ */
}  
  
/* 1. コンテナの高さ計算を修正（ナビの60pxを引く） */
/* 1. コンテナ：flexboxで全体を中央揃えに保つ */
#camera-container {
  position: relative;
  width: 100vw;
  height: calc(100vh - 60px); 
  background: #000;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center; /* 垂直中央揃え */
}
/* 2. ビデオの表示を調整 */

  position: absolute;
  width: 100%;
  height: 80%;
  object-fit: cover; /* 画面全体を埋める */
  z-index: 1;
}
/* 3. ガイド枠：親（container）の中央配置に追従させる */
#guide-frame {
  position: absolute; /* 親を基準に中央に配置するため */
  z-index: 2;
  width: 80vw;
  height: calc(80vw * 55 / 91);
  border: 2px solid rgba(255, 255, 0, 0.8);
  pointer-events: none;

}
/* 通常時 */

/* 認識成功時 */

  border: 4px solid #ff0000 !important; 
  /* 背景を暗くせず、枠だけ赤くする */
}

<script>  
const video = document.getElementById('video');
const captureBtn = document.getElementById('capture-btn');
const canvas = document.getElementById('outputCanvas');
const guideFrame = document.getElementById('guide-frame');
const actionBtns = document.getElementById('actionBtns');
const sendBtn = document.getElementById('sendBtn');
const retryBtn = document.getElementById('retryBtn');
const backCaptureBtn = document.getElementById('backCaptureBtn');

let isDetecting = true;
let globalCardId = null; 
let isFrontSide = true; 
let capturedImages = { front: null, back: null };
let captureCounter = 0; // ここに宣言が必要

  // モックデータ
const mockData = [
  { id: 1, name: "山田 太郎", company: "株式会社サンプル", image: "url_to_image" },
  { id: 2, name: "佐藤 花子", company: "デザイン事務所", image: "url_to_image" }
];

document.getElementById('loginBtn').addEventListener('click', async () => {
  const id = document.getElementById('loginId').value;
  const pass = document.getElementById('loginPass').value;
  // --- 1. 二度押し防止の開始 ---
  loginBtn.disabled = true;
  const originalText = loginBtn.textContent;
  loginBtn.textContent = "ログイン処理中...";
  loginBtn.style.backgroundColor = "#ccc"; // 色を変えるとより「押せない」ことが伝わります
  
  // ★ここをGASのデプロイURLに書き換えてください
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyya3RzVXc9pdWUCNhBaJN-F7_ShidH16FVFuL5VMh1CFLDifyAnUBkM-Z987FKb8o0/exec"; 

  try {
    const response = await fetch(GAS_URL, {
      method: 'POST',
      // モードをno-corsにするとエラーが取れない場合があるので、通常はデフォルト（cors）でGAS側を適切に設定します
      body: JSON.stringify({ action: "login", id: id, pass: pass })
    });
    const result = await response.json();

   // ログインボタンの成功時の処理を修正
    if (result.success) {
      sessionStorage.setItem('isLoggedIn', 'true');
      sessionStorage.setItem('userName', result.userName); // 追加
      showPage('page-camera');
      document.getElementById('bottom-nav').style.display = 'flex';
    }else {
      alert("IDまたはパスワードが違います");
      // 失敗した時だけボタンを戻す
      loginBtn.disabled = false;
      loginBtn.textContent = originalText;
      loginBtn.style.backgroundColor = "#007bff";
    }
  } catch (e) {
    console.error(e);
    alert("通信エラーが発生しました");
    // エラー時もボタンを戻す
    loginBtn.disabled = false;
    loginBtn.textContent = originalText;
    loginBtn.style.backgroundColor = "#007bff";
  }
});
  
function showPage(pageId) {
  // 全ページを隠す
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  // 指定ページを表示
  document.getElementById(pageId).style.display = 'block';
  
  // 【ここがポイント】撮影ページに移動したときだけカメラを起動する
  if (pageId === 'page-camera') {
    // すでにカメラが起動していなければ起動する
    if (!video.srcObject) {
      startCamera();
    }
    isDetecting = true;
    detectLoop();
  } else {
    // 撮影ページ以外はカメラを止める
    isDetecting = false;
    // 必要であればここでカメラストリームを停止させる処理を入れることも可能
  }
}


// 検索窓のイベントを修正
document.getElementById('searchInput').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  
  // 検索条件で絞り込み
  const filtered = mockData.filter(item => 
    item.name.toLowerCase().includes(query) || item.company.toLowerCase().includes(query)
  );

  // 絞り込まれた結果をカードとして再描画
  renderCards(filtered);
});


function showDetail(item) {
  document.getElementById('detailView').style.display = 'block';
  document.getElementById('detailContent').innerHTML = `<h3>${item.name}</h3><p>${item.company}</p>`;
}

function closeDetail() {
  document.getElementById('detailView').style.display = 'none';
}
  
  
// 1. カメラ起動
async function startCamera() {
 
  const constraints = {
    video: {
      width: { ideal: 1920 },
      height: { ideal: 1080 },
      facingMode: { ideal: "environment" },
      advanced: [{ focusMode: "continuous" }]
    }
  };
  try {
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    video.onloadedmetadata = () => detectLoop();
  } catch (err) { alert("カメラアクセスを許可してください"); }
}

// 2. ループ処理
let lastArea = 0; // ファイルの先頭近くに配置してください

function detectLoop() {
  if (!isDetecting) return;
  if (video.style.display === 'none') return;

  // 1. ビデオ全体を一度読み込む
  let fullMat = cv.imread(video);
  
  // 2. ガイド枠が中央にあるので、その周辺だけを切り出す (ROI)
  // fullMat.cols と rows は映像の解像度です。
  // ここでは画面の中央、横幅の60%、高さの60%のエリアを切り出します
  let width = fullMat.cols;
  let height = fullMat.rows;
  let roiRect = new cv.Rect(
    Math.floor(width * 0.2),  // 開始X (左から20%)
    Math.floor(height * 0.2), // 開始Y (上から20%)
    Math.floor(width * 0.6),  // 切り出す幅 (全体の60%)
    Math.floor(height * 0.6)  // 切り出す高さ (全体の60%)
  );
  
  let src = fullMat.roi(roiRect); // これで中心部分だけが src になる
  let gray = new cv.Mat();
  let canny = new cv.Mat();
  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.Canny(gray, canny, 50, 150);
  cv.findContours(canny, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

  let found = false;
  let minArea = (video.videoWidth * video.videoHeight) * 0.03;
  let maxArea = (video.videoWidth * video.videoHeight) * 0.60;

  for (let i = 0; i < contours.size(); ++i) {
    let cnt = contours.get(i);
    let area = cv.contourArea(cnt);
    
    // ブレ対策：急激な変化は無視
    if (Math.abs(area - lastArea) > (area * 0.5)) {
      lastArea = area;
      continue;
    }

    let approx = new cv.Mat();
    cv.approxPolyDP(cnt, approx, 0.06 * cv.arcLength(cnt, true), true);

    let rect = cv.boundingRect(cnt);
    let aspectRatio = rect.width / rect.height;
    let isGoodAspectRatio = aspectRatio > 1.3 && aspectRatio < 2.0;

    if (approx.rows === 4 && area > minArea && area < maxArea && isGoodAspectRatio) {
      found = true;
      lastArea = area;
      approx.delete(); // ここで削除
      break; 
    }
    approx.delete();
  }
  
  guideFrame.className = found ? 'guide-detected' : 'guide-default';

  if (found) {
    captureCounter++;
    if (captureCounter >= 5) {
      captureCounter = 0;
      captureBtn.click();
    }
  } else {
    captureCounter = 0;
  }

  src.delete(); gray.delete(); canny.delete(); contours.delete(); hierarchy.delete();fullMat.delete();roi.delete(); // これも忘れずに
  setTimeout(() => requestAnimationFrame(detectLoop), 200);
}

// 3. 撮影処理
captureBtn.addEventListener('click', async () => {
let globalCardId = null; // 撮影セッションID
let isFrontSide = true;  // 現在の面
let capturedImages = { front: null, back: null }; // 画像保持用
  
// IDがまだなければ作成（これがファイル名のキーになる）
  if (!globalCardId) globalCardId = Date.now();  
  
  isDetecting = false;
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = video.videoWidth; tempCanvas.height = video.videoHeight;
  tempCanvas.getContext('2d').drawImage(video, 0, 0);

  let src = cv.imread(tempCanvas);
  let gray = new cv.Mat();
  let blur = new cv.Mat();
  let canny = new cv.Mat();
  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);
  cv.Canny(blur, canny, 20, 80);
  cv.findContours(canny, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

  let bestContour = null, maxArea = 0;
  for (let i = 0; i < contours.size(); ++i) {
    let cnt = contours.get(i);
    let approx = new cv.Mat();
    cv.approxPolyDP(cnt, approx, 0.04 * cv.arcLength(cnt, true), true);
    if (approx.rows === 4 && cv.contourArea(cnt) > maxArea) {
      maxArea = cv.contourArea(cnt);
      bestContour = cnt;
    }
    approx.delete();
  }

  if (bestContour) {
    warpPerspective(src, bestContour);
    // 【重要】ここでグローバル変数に保存する
    capturedImages[isFrontSide ? 'front' : 'back'] = canvas.toDataURL('image/jpeg', 0.8);
    
    video.style.display = 'none';
    canvas.style.display = 'block';
    guideFrame.style.display = 'none';
    showActionUI();
  } else {
    alert("認識できませんでした。");
    isDetecting = true;
  }

  src.delete(); gray.delete(); blur.delete(); canny.delete(); contours.delete(); hierarchy.delete();
});


// --- ボタンイベント ---  
// 【修正1】retryBtnの不要なコードを削除
    retryBtn.addEventListener('click', () => {
      video.style.display = 'block';
      canvas.style.display = 'none';
      captureBtn.style.display = 'block';
      actionBtns.style.display = 'none';
      guideFrame.style.display = 'block';
      isDetecting = true;
      captureCounter = 0;
      detectLoop();
    });

  backCaptureBtn.addEventListener('click', () => {
  isFrontSide = false;
  showCaptureUI();
  isDetecting = true;
  detectLoop();
});

// --- UI制御関数 ---
function showActionUI() {

  actionBtns.style.display = 'flex';

function showCaptureUI() {

  video.style.display = 'block';
  canvas.style.display = 'none';
  guideFrame.style.display = 'block';
}
  
// 5. warpPerspective (省略なし)
function warpPerspective(src, contour) {
  let perimeter = cv.arcLength(contour, true);
  let approx = new cv.Mat();
  cv.approxPolyDP(contour, approx, 0.04 * perimeter, true);

  let points = [];
  for (let i = 0; i < 4; i++) {
    points.push({ x: approx.data32S[i * 2], y: approx.data32S[i * 2 + 1] });
  }
  points.sort((a, b) => a.y - b.y);
  let top = points.slice(0, 2).sort((a, b) => a.x - b.x);
  let bottom = points.slice(2, 4).sort((a, b) => a.x - b.x);
  let sortedPoints = [top[0], top[1], bottom[1], bottom[0]];

  let dstWidth = 800, dstHeight = 500;
  canvas.width = dstWidth; canvas.height = dstHeight;
  let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
    sortedPoints[0].x, sortedPoints[0].y, sortedPoints[1].x, sortedPoints[1].y,
    sortedPoints[2].x, sortedPoints[2].y, sortedPoints[3].x, sortedPoints[3].y
  ]);
  let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, dstWidth, 0, dstWidth, dstHeight, 0, dstHeight]);
  let M = cv.getPerspectiveTransform(srcTri, dstTri);
  let dst = new cv.Mat();
  cv.warpPerspective(src, dst, M, new cv.Size(dstWidth, dstHeight));
  let normalized = new cv.Mat();
  cv.normalize(dst, normalized, 0, 255, cv.NORM_MINMAX);
  cv.imshow('outputCanvas', normalized);
  normalized.delete(); dst.delete(); M.delete(); srcTri.delete(); dstTri.delete(); approx.delete();
}

// 【送信機能本体】
// 【送信機能】まとめて送信するように変更
async function uploadAllImages() {
  const cloudRunUrl = 'https://upload-meishi-function-769951420007.asia-northeast2.run.app';
  const userName = sessionStorage.getItem('userName');

  // 送信用のデータ構造
  const payload = {
    id: globalCardId, // 表面・裏面共通のID
    userName: userName,
    frontBase64: capturedImages.front.split(',')[1],
    backBase64: capturedImages.back ? capturedImages.back.split(',')[1] : null
  };

  // Cloud Runへ一括送信
  const response = await fetch(cloudRunUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  if (!response.ok) throw new Error("画像送信失敗: " + await response.text());
  
  return true;
}

// 【送信ボタンの処理】
sendBtn.addEventListener('click', async () => {
  if (!capturedImages.front) {
    alert("表面が撮影されていません");
    return;
  }

  sendBtn.disabled = true;
  const originalText = sendBtn.textContent;
  sendBtn.textContent = "送信中...";

  try {
    await uploadAllImages();

    alert("送信完了しました");
    
    // リセットして次の撮影へ
    globalCardId = null;
    isFrontSide = true;
    capturedImages = { front: null, back: null };
    
    showCaptureUI(); // 最初の画面に戻す
  } catch (e) {
    alert("エラー: " + e.message);
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = originalText;
  }
});

  

  // 【追加】ページロード時にカードを表示
window.addEventListener('load', () => {
  renderCards(mockData); // カード表示だけは最初に行う
  // ログイン状態ならカメラを起動する
  if (sessionStorage.getItem('isLoggedIn') === 'true') {
    showPage('page-camera');
    document.getElementById('bottom-nav').style.display = 'flex';
  } else {
    showPage('page-login');
    document.getElementById('bottom-nav').style.display = 'none';
  }
    });
  
// カード描画関数（これで統一）
function renderCards(dataList) {
  const container = document.getElementById('card-container');
  container.innerHTML = ""; // クリア

  dataList.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div>
        <h3>${item.name}</h3>
        <p>${item.company}</p>
      </div>
      <button class="detail-btn" onclick="openDetail(${item.id})">詳細</button>
    `;
    container.appendChild(card);
  });
}

 // 【追加】詳細表示用関数
    function openDetail(id) {
      const item = mockData.find(d => d.id === id);
      alert(`詳細表示: ${item.name} - ${item.company}`);
    } 


  </script>
</body>
